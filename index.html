<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dink Gear Shop — Premium Pickleball Equipment</title>
  <meta name="description" content="Dink Gear Shop is your one-stop destination for premium pickleball paddles, balls, shoes, and accessories. Coming soon!">
  <meta name="keywords" content="pickleball gear, pickleball paddle, pickleball equipment, pickleball shop, buy pickleball">
  <link rel="canonical" href="https://dinkgearshop.com/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dinkgearshop.com/">
  <meta property="og:title" content="Dink Gear Shop — Premium Pickleball Equipment">
  <meta property="og:description" content="Your one-stop shop for premium pickleball gear. Paddles, balls, shoes, and more.">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 70px);
      padding: 2rem;
      background: radial-gradient(ellipse at center, #e8f5e8 0%, #f4faf4 70%);
      text-align: center;
    }

    .badge {
      display: inline-block;
      background-color: #d4edda;
      color: #2d6a2d;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      border: 1px solid #b2dfb2;
    }

    h1 {
      font-size: 3rem;
      color: #1e4d1e;
      line-height: 1.3;
      max-width: 700px;
      margin-bottom: 1.2rem;
    }

    .subtitle {
      font-size: 1rem;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 60px;
      height: 3px;
      background-color: #7dce7d;
      border-radius: 2px;
      margin: 0 auto;
    }

    .email-form {
      margin-top: 2.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .email-form input[type="email"] {
      padding: 0.75rem 1.25rem;
      border: 2px solid #b2dfb2;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      width: 300px;
      outline: none;
      background-color: #fff;
      color: #333;
      transition: border-color 0.2s;
    }

    .email-form input[type="email"]:focus {
      border-color: #2d6a2d;
    }

    .email-form button {
      padding: 0.75rem 1.75rem;
      background-color: #2d6a2d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .email-form button:hover {
      background-color: #1e4d1e;
    }

    .email-note {
      margin-top: 0.85rem;
      font-size: 0.78rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html">
      🏓 Dink <span>Gear</span> Shop
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="shop.html" class="cta">Shop Now</a></li>
    </ul>
  </nav>

  <main>
    <div class="hero">
      <div class="badge">🏓 Coming Soon</div>
      <h1>Pickleball is a great sport. You should try it sometime!</h1>
      <div class="divider"></div>
      <p class="subtitle" style="margin-top: 1.5rem;">This website is coming soon!</p>

      <form class="email-form" onsubmit="handleSubmit(event)">
        <input type="email" placeholder="Enter your email address" required />
        <button type="submit">Notify Me</button>
      </form>
      <p class="email-note">No spam, ever. We'll only reach out when we launch.</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 <a href="index.html">Dink Gear Shop</a>. All rights reserved.</p>
  </footer>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const input = e.target.querySelector('input');
      btn.textContent = "You're on the list!";
      btn.style.backgroundColor = '#7dce7d';
      btn.style.color = '#1e4d1e';
      btn.disabled = true;
      input.disabled = true;
    }
  </script>

</body>
</html>
